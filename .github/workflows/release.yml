name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build multi-plateforme
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          OUTPUT="mailauthcheck-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "${OUTPUT}" .
          sha256sum "${OUTPUT}" > "${OUTPUT}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mailauthcheck-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            mailauthcheck-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
            mailauthcheck-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}.sha256

  release:
    name: Publier la release GitHub
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger tous les artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Créer la release et uploader les binaires
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
